name: dropcity
description: "DropCity Client App - P2P Logistics Platform for delivery requests and tracking"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1
  firebase_storage: 13.0.6

  # Supabase
  supabase_flutter: ^2.6.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local Storage
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^10.1.0

  # Connectivity
  connectivity_plus: ^5.0.0

  # Maps
  google_maps_flutter: ^2.14.0
  google_maps_flutter_web: ^0.5.14+3
  flutter_polyline_points: ^2.1.0

  # Navigation
  go_router: ^13.2.5

  # UI Utilities
  flutter_screenutil: ^5.9.0
  sizer: ^2.0.15
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  fluttertoast: ^8.2.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  dio: ^5.3.0
  logger: ^2.0.0
  get_it: ^7.6.0
  flutter_secure_storage: ^9.0.0

  # Image Handling & Camera
  image_picker: ^1.0.0
  
  # Real-time Socket.io
  socket_io_client: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
